services:
  - type: web
    name: alba-music-academy
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm run server
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOOKING_SERVER_PORT
        value: "3000"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: ADMIN_ALLOWED_ORIGINS
        value: https://your-app.onrender.com
      - key: SMTP_HOST
        value: in-v3.mailjet.com
      - key: SMTP_PORT
        value: "587"
      - key: PUBLIC_APP_URL
        value: https://your-app.onrender.com
